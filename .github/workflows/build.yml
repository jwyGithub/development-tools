name: Build

on:
  push:
    paths:
      - 'tools/zip/**'
    branches:
      - main
  pull_request:
    paths:
      - 'tools/zip/**'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        arch: [x86_64, aarch64]
        exclude:
          # Windows ARM64 暂不支持
          - os: windows-latest
            arch: aarch64
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          target: ${{ matrix.arch == 'x86_64' && 'x86_64-unknown-linux-gnu' || 'aarch64-unknown-linux-gnu' }}
          override: true
      
      - name: Build
        working-directory: tools/zip
        run: |
          cargo build --release --target ${{ matrix.arch == 'x86_64' && 'x86_64-unknown-linux-gnu' || 'aarch64-unknown-linux-gnu' }}
      
      - name: Rename binary
        working-directory: tools/zip/target/release
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv ziper.exe ziper-windows-${{ matrix.arch }}.exe
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            mv ziper ziper-darwin-${{ matrix.arch }}
          else
            mv ziper ziper-linux-${{ matrix.arch }}
          fi
        shell: bash
      
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: ziper-${{ matrix.os }}-${{ matrix.arch }}
          path: tools/zip/target/release/ziper-*
