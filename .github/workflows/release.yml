name: Release

on:
  push:
    tags:
      - 'zip-v*'

jobs:
  build-and-release:
    strategy:
      matrix:
        include:
          # Linux builds
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: ziper-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_name: ziper-linux-arm64
          
          # macOS builds
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: ziper-darwin-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: ziper-darwin-arm64
          
          # Windows builds
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: ziper-windows-amd64.exe
          - os: windows-latest
            target: i686-pc-windows-msvc
            binary_name: ziper-windows-386.exe
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          target: ${{ matrix.target }}
          override: true
      
      - name: Build Release Binary
        working-directory: tools/zip
        run: cargo build --release --target ${{ matrix.target }}
      
      - name: Prepare Binary
        shell: bash
        working-directory: tools/zip
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/ziper.exe target/${{ matrix.target }}/release/${{ matrix.binary_name }}
          else
            cp target/${{ matrix.target }}/release/ziper target/${{ matrix.target }}/release/${{ matrix.binary_name }}
          fi
      
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: tools/zip/target/${{ matrix.target }}/release/${{ matrix.binary_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
